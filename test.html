<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary Lookup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #search {
            width: 300px;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 16px;
        }
        #results {
            list-style-type: none;
            padding: 0;
        }
        #results li {
            padding: 5px 0;
        }
        .word {
            font-weight: bold;
        }
        .pos {
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>Dictionary Lookup</h1>
    <input type="text" id="search" placeholder="Type a word...">
    <ul id="results"></ul>

    <script>
        const dictionary = [];

        function loadCSV() {
            fetch('dictionary.csv')
                .then(response => response.text())
                .then(csv => parseCSV(csv))
                .catch(error => console.error('Error loading CSV:', error));
        }

        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');

            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',');
                const entry = {};
                headers.forEach((header, index) => {
                    entry[header.trim()] = values[index].trim();
                });
                dictionary.push(entry);
            }
        }

        function filterDictionary(query) {
            return dictionary.filter(entry => entry.word.includes(query.toLowerCase()));
        }

        function displayResults(results) {
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = '';

            results.forEach(entry => {
                const li = document.createElement('li');
                li.innerHTML = `<span class="word">${entry.word}</span> (<span class="pos">${entry.part_of_speech}</span>): ${entry.definition}`;
                resultsContainer.appendChild(li);
            });
        }

        document.getElementById('search').addEventListener('input', function() {
            const query = this.value.trim().toLowerCase();
            if (query.length > 0) {
                const results = filterDictionary(query);
                displayResults(results);
            } else {
                document.getElementById('results').innerHTML = '';
            }
        });

        loadCSV();
    </script>
</body>
</html>
