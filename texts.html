<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🜎 Text Repository</title>
    <style>
        :root {
            --bg: #F0F0F0;
            --surface: #FFFFFF;
            --border: #DADCE0;
            --text: #202124;
            --accent: #4B0082;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        #title {
            text-align: center;
            padding: 1rem;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
        }

        #container {
            display: grid;
            grid-template-columns: 250px 1fr;
            height: calc(100vh - 65px);
        }

        #sidebar {
            border-right: 1px solid var(--border);
            padding: 1rem;
            background: var(--surface);
        }

        #content {
            padding: 2rem;
            background: var(--surface);
            overflow-y: auto;
        }

        #search {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .file-item {
            padding: 0.5rem;
            cursor: pointer;
            border-radius: 4px;
        }

        .file-item:hover {
            background: var(--bg);
        }

        .tooltip {
            border-bottom: 1px dotted var(--accent);
            cursor: help;
            position: relative;
        }

        .tooltip-content {
            display: none;
            position: absolute;
            background: var(--surface);
            border: 1px solid var(--accent);
            padding: 0.5rem;
            border-radius: 4px;
            z-index: 1;
            min-width: 200px;
        }

        .tooltip:hover .tooltip-content {
            display: block;
        }

        @media (max-width: 768px) {
            #container {
                grid-template-columns: 1fr;
            }

            #sidebar {
                position: fixed;
                top: 0;
                left: -100%;
                width: 80%;
                height: 100vh;
                z-index: 100;
                transition: left 0.3s;
            }

            .menu-open #sidebar {
                left: 0;
            }

            #mobile-menu {
                display: block;
                position: fixed;
                top: 1rem;
                left: 1rem;
                z-index: 101;
            }
        }
    </style>
</head>
<body>
    <h1 id="title">🜎</h1>
    <button id="mobile-menu" style="display: none;">☰</button>
    <div id="container">
        <div id="sidebar">
            <input type="text" id="search" placeholder="Search all texts...">
            <div id="file-list"></div>
        </div>
        <div id="content"></div>
    </div>

    <script>
        // Load and process text files
        async function loadFiles() {
            try {
                const response = await fetch('./texts/');
                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const links = Array.from(doc.querySelectorAll('a'))
                    .filter(a => a.href.endsWith('.txt'))
                    .map(a => a.href.split('/').pop());

                const fileContents = await Promise.all(links.map(async file => {
                    const response = await fetch(`./texts/${file}`);
                    return {
                        name: file,
                        content: await response.text()
                    };
                }));

                populateSidebar(fileContents);
                loadInitialContent(fileContents);
                setupSearch(fileContents);
            } catch (error) {
                console.error('Error loading files:', error);
                content.innerHTML = '<p>Error loading text files. Ensure the /texts directory exists with .txt files.</p>';
            }
        }

        function populateSidebar(files) {
            const fileList = document.getElementById('file-list');
            fileList.innerHTML = files
                .map(file => `<div class="file-item" data-file="${file.name}">${file.name.replace('.txt', '')}</div>`)
                .join('');
            
            document.querySelectorAll('.file-item').forEach(item => {
                item.addEventListener('click', () => loadFileContent(files.find(f => f.name === item.dataset.file)));
            });
        }

        function loadFileContent(file) {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = formatContent(file.content);
            setupTooltips();
        }

        function formatContent(text) {
            return text
                .replace(/# (.*)/g, '<h1>$1</h1>')
                .replace(/## (.*)/g, '<h2>$1</h2>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\(\((.*?)\)\):(.*?)(\n|$)/g, '<span class="tooltip">$1<span class="tooltip-content">$2</span></span>');
        }

        function setupSearch(files) {
            const searchInput = document.getElementById('search');
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                if (!query) {
                    document.querySelectorAll('.file-item').forEach(el => el.style.display = 'block');
                    return;
                }

                files.forEach(file => {
                    const matches = file.content.toLowerCase().includes(query);
                    document.querySelector(`.file-item[data-file="${file.name}"]`).style.display = matches ? 'block' : 'none';
                });
            });
        }

        function setupTooltips() {
            document.querySelectorAll('.tooltip').forEach(tooltip => {
                tooltip.addEventListener('click', (e) => {
                    if (window.innerWidth <= 768) {
                        e.preventDefault();
                        tooltip.querySelector('.tooltip-content').classList.toggle('active');
                    }
                });
            });
        }

        // Mobile menu toggle
        document.getElementById('mobile-menu').addEventListener('click', () => {
            document.body.classList.toggle('menu-open');
        });

        // Initialize
        loadFiles();
    </script>
</body>
</html>
