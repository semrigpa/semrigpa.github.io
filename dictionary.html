<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semrigpa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .title {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 60px;
            text-align: center;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 8s ease-in-out infinite;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        @keyframes rainbow {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            max-width: 300px;
            width: 100%;
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s ease;
        }

        .app-icon:hover {
            transform: scale(1.05);
        }

        .app-icon:active {
            transform: scale(0.95);
        }

        .icon-container {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 8px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: box-shadow 0.2s ease;
        }

        .icon-container:hover {
            box-shadow: 0 12px 35px rgba(0,0,0,0.4);
        }

        .mavani {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
        }

        .dictionary {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        .app-label {
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            max-width: 90px;
            line-height: 1.2;
        }

        /* Mobile responsiveness */
        @media (max-width: 480px) {
            .title {
                font-size: 2.5rem;
                margin-bottom: 50px;
            }
            
            .app-grid {
                gap: 30px;
                max-width: 250px;
            }
            
            .icon-container {
                width: 70px;
                height: 70px;
                font-size: 2rem;
            }
            
            .app-label {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 360px) {
            .title {
                font-size: 2rem;
            }
            
            .icon-container {
                width: 60px;
                height: 60px;
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <h1 class="title">Semrigpa</h1>
    
    <div class="app-grid">
        <a href="https://semrigpa.github.io/mavani.html" class="app-icon">
            <div class="icon-container mavani">
                🌸
            </div>
            <span class="app-label">Mā Vāṇi</span>
        </a>
        
        <a href="https://semrigpa.github.io/dictionary.html" class="app-icon">
            <div class="icon-container dictionary">
                📓
            </div>
            <span class="app-label">Dictionary</span>
        </a>
    </div>
</body>
</html>
