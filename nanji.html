<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanji Dictionary</title>
    <style>
        :root {
            --primary: #a855f7;
            --primary-dark: #9333ea;
            --background: #0f172a;
            --surface: #1e1b4b;
            --border: #312e81;
            --text: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--text);
            line-height: 1.5;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            background-color: var(--background);
            z-index: 10;
            border-bottom: 1px solid var(--border);
        }

        .back-button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            width: 2.5rem;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background-color 0.2s;
        }

        .back-button:hover {
            background: var(--primary-dark);
        }

        .search-container {
            flex-grow: 1;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            background-color: var(--surface);
            color: var(--text);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .results-counter {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: 0.5rem;
            min-height: 1.5rem;
        }

        .results-number {
            color: var(--primary);
            font-weight: 600;
        }

        .dictionary-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid var(--border);
            background-color: var(--surface);
            contain: strict;
        }

        .dictionary-table th {
            background-color: var(--surface);
            color: var(--primary);
            font-weight: 600;
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .dictionary-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            background-color: var(--background);
        }

        .dictionary-table tr:last-child td {
            border-bottom: none;
        }

        .lang-text {
            color: var(--primary);
            will-change: transform;
        }

        .pos-tag {
            font-size: 0.875
