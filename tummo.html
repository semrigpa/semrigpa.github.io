</div>
</div>

<div class="w3-container" style="padding-top: 25px;">

    <h2>Title</h2>
    <h3>Subheading</h3>
    <button onclick="myFunction('Demo1')" class="w3-button w3-block w3-grey w3-left-align">
Open Section 1</button>

<div id="Demo1" class="w3-container w3-hide w3-animate-zoom w3-white">
  <p>Some text..</p>
</div>
<br>
</div>

<script>
function myFunction(id) {
  var x = document.getElementById(id);
  if (x.className.indexOf("w3-show") == -1) {
    x.className += " w3-show";
  } else { 
    x.className = x.className.replace(" w3-show", "");
  }
}
</script>
