<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Messaging App</title>
    <style>
        body {
            font-family: sans-serif;
            background: linear-gradient(to right, #000046, #1cb5e0);
            color: #f0f0f0;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #app {
            max-width: 800px;
            margin: auto;
            position: relative;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
        }
        #nav {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            position: relative;
        }
        #nav button {
            background: #444;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
        }
        #nav button:hover {
            background: #555;
            transform: scale(1.1);
        }
        #content {
            padding: 20px;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
            animation: fadeIn 1s;
        }
        .hidden {
            display: none;
        }
        input {
            padding: 10px;
            width: calc(100% - 22px);
            border-radius: 5px;
            border: none;
            margin: 5px 0;
            transition: background 0.3s;
        }
        input:focus {
            background: #222;
        }
        button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #005a5a;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
        }
        button:hover {
            background: #004040;
            transform: scale(1.1);
        }
        h1, p {
            margin: 0;
            padding: 10px 0;
        }
        #message-list div {
            padding: 10px;
            background: #333;
            border-radius: 5px;
            margin: 5px 0;
            transition: background 0.3s;
        }
        #message-list div:hover {
            background: #444;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        #settings .toggle {
            display: inline-block;
            width: 50px;
            height: 25px;
            background: #005a5a;
            border-radius: 25px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        #settings .toggle::before {
            content: '';
            width: 25px;
            height: 25px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            transition: transform 0.3s;
        }
        #settings .toggle.active {
            background: #004040;
        }
        #settings .toggle.active::before {
            transform: translateX(25px);
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="nav">
            <button onclick="showPage('home')">🛸 Home</button>
            <button onclick="showPage('messages')">📡 Messages</button>
            <button onclick="showPage('settings')">⚙️ Settings</button>
        </div>
        <div id="content">
            <div id="home" class="page">
                <h1>👽 Welcome to Alien Chat 🌌</h1>
                <p>Connect with extraterrestrial beings!</p>
                <p>🌠 Explore the universe of alien emojis!</p>
            </div>
            <div id="messages" class="page hidden">
                <h1>📡 Alien Messages</h1>
                <div id="message-list"></div>
                <input type="text" id="message-input" placeholder="Enter your alien message...">
                <button onclick="sendMessage()">Send</button>
            </div>
            <div id="settings" class="page hidden">
                <h1>⚙️ Settings</h1>
                <p>Customize your alien experience.</p>
                <div class="toggle" onclick="toggleSwitch(this)"></div>
                <p id="theme-status">🌑 Dark Mode</p>
            </div>
        </div>
    </div>
    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const messageList = document.getElementById('message-list');
            if (input.value.trim()) {
                const newMessage = document.createElement('div');
                newMessage.textContent = `👽 ${input.value}`;
                newMessage.classList.add('animated');
                messageList.appendChild(newMessage);
                input.value = '';
                setTimeout(() => newMessage.classList.remove('animated'), 1000);
            }
        }

        function toggleSwitch(element) {
            element.classList.toggle('active');
            document.getElementById('theme-status').textContent = element.classList.contains('active') ? '🌕 Light Mode' : '🌑 Dark Mode';
        }

        document.addEventListener('DOMContentLoaded', () => showPage('home'));
        
        document.querySelectorAll('#message-list div').forEach(div => {
            div.addEventListener('click', () => div.classList.toggle('highlight'));
        });
    </script>
</body>
</html>
