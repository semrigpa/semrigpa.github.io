<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Game</title>
    <style>
        body{display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#f0f0f0}.puzzle{display:grid;grid-template-columns:repeat(4,100px);gap:5px}.tile{width:100px;height:100px;background:#ccc;display:flex;align-items:center;justify-content:center;font-size:24px;color:#333;cursor:pointer}.tile.blank{background:#fff;cursor:default}.puzzle-button{display:block;width:120px;height:30px;margin:20px auto;cursor:pointer;background:#007bff;color:#fff;border:none;border-radius:5px;font-size:16px}.puzzle-button:hover{background:#0056b3}
    </style>
</head>
<body>
    <div class="puzzle" id="puzzle"></div>
    <button class="puzzle-button" onclick="shuffle()">Shuffle</button>
    <script>
        const size=4,puzzle=document.getElementById('puzzle');let tiles=[];function init(){puzzle.innerHTML='';tiles=[];for(let i=0;i<size*size;i++){const tile=document.createElement('div');tile.className='tile';tile.textContent=i+1;tile.dataset.index=i;tile.onclick=move;tiles.push(tile);puzzle.appendChild(tile)}tiles[size*size-1].classList.add('blank');tiles[size*size-1].textContent=''}function move(e){const index=Number(e.target.dataset.index),blankIndex=tiles.findIndex(tile=>tile.classList.contains('blank'));if([index-1,index+1,index-size,index+size].includes(blankIndex)){[tiles[index].textContent,tiles[blankIndex].textContent]=[tiles[blankIndex].textContent,tiles[index].textContent];tiles[index].classList.toggle('blank');tiles[blankIndex].classList.toggle('blank');tiles[index].dataset.index=blankIndex;tiles[blankIndex].dataset.index=index}}function shuffle(){for(let i=0;i<100;i++){const blankIndex=tiles.findIndex(tile=>tile.classList.contains('blank')),possibleMoves=[blankIndex-1,blankIndex+1,blankIndex-size,blankIndex+size].filter(index=>index>=0&&index<size*size);const moveIndex=possibleMoves[Math.floor(Math.random()*possibleMoves.length)];if(moveIndex!==undefined){[tiles[blankIndex].textContent,tiles[moveIndex].textContent]=[tiles[moveIndex].textContent,tiles[blankIndex].textContent];tiles[blankIndex].classList.toggle('blank');tiles[moveIndex].classList.toggle('blank');tiles[blankIndex].dataset.index=moveIndex;tiles[moveIndex].dataset.index=blankIndex}}}init();
    </script>
</body>
</html>
