<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary Lookup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #dictionary-container {
            margin-top: 20px;
        }
        .word-entry {
            margin-bottom: 10px;
        }
        .word-entry span {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Dictionary Lookup</h1>
    <label for="wordInput">Enter a word in English:</label>
    <input type="text" id="wordInput">
    <button onclick="lookupWord()">Lookup</button>

    <div id="dictionary-container"></div>

    <script>
        const dictionary = {};

        // Load the CSV file
        fetch('dictionary.csv')
            .then(response => response.text())
            .then(text => {
                const lines = text.split('\n').slice(1); // Skip header line
                lines.forEach(line => {
                    const [word, definition, part_of_speech] = line.split(',');
                    dictionary[word.trim().toLowerCase()] = {
                        definition: definition.trim(),
                        part_of_speech: part_of_speech.trim()
                    };
                });
            });

        function lookupWord() {
            const word = document.getElementById('wordInput').value.trim().toLowerCase();
            const entry = dictionary[word];

            const container = document.getElementById('dictionary-container');
            container.innerHTML = ''; // Clear previous result

            if (entry) {
                container.innerHTML = `
                    <div class="word-entry">
                        <span>Word:</span> ${word}
                    </div>
                    <div class="word-entry">
                        <span>Definition:</span> ${entry.definition}
                    </div>
                    <div class="word-entry">
                        <span>Part of Speech:</span> ${entry.part_of_speech}
                    </div>
                `;
            } else {
                container.innerHTML = '<div class="word-entry">Word not found in the dictionary.</div>';
            }
        }
    </script>
</body>
</html>
