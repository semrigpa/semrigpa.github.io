<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary Lookup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #dictionary {
            max-width: 600px;
            margin: 0 auto;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .definition {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <div id="dictionary">
        <h1>Dictionary Lookup</h1>
        <input type="text" id="wordInput" placeholder="Type a word..." oninput="lookupWord()">
        <div id="definition" class="definition"></div>
    </div>

    <script>
        const dictionary = {};

        fetch('dictionary.csv')
            .then(response => response.text())
            .then(data => {
                const lines = data.split('\\n');
                for (let i = 1; i < lines.length; i++) {
                    const [word, definition] = lines[i].split(',');
                    dictionary[word.trim().toLowerCase()] = definition.trim();
                }
            });

        function lookupWord() {
            const input = document.getElementById('wordInput').value.trim().toLowerCase();
            const definition = dictionary[input] || 'No definition found';
            document.getElementById('definition').innerText = definition;
        }
    </script>
</body>
</html>
