<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mā Vāṇi</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
    
    <!-- React -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { Search, Book, Hash, Tag } = lucide;

        const QuoteSearch = () => {
            const [quotes, setQuotes] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedTheme, setSelectedTheme] = useState('all');
            const [selectedSource, setSelectedSource] = useState('all');
            const [selectedNumber, setSelectedNumber] = useState('all');
            const [themes, setThemes] = useState(new Set());
            const [sources, setSources] = useState(new Set());
            const [numbers, setNumbers] = useState(new Set());

            useEffect(() => {
                fetch('vani.tsv')
                    .then(response => response.text())
                    .then(data => {
                        const rows = data.split('\n').slice(1); // Skip header
                        const parsedQuotes = rows.map(row => {
                            const [theme, source, number, quote] = row.split('\t');
                            return { theme, source, number, quote };
                        });
                        setQuotes(parsedQuotes);
                        
                        // Extract unique values for filters
                        setThemes(new Set(parsedQuotes.map(q => q.theme)));
                        setSources(new Set(parsedQuotes.map(q => q.source)));
                        setNumbers(new Set(parsedQuotes.map(q => q.number)));
                    })
                    .catch(error => {
                        console.error('Error loading quotes:', error);
                    });
            }, []);

            const highlightText = (text, highlight) => {
                if (!highlight.trim()) return text;
                const regex = new RegExp(`(${highlight})`, 'gi');
                return text.split(regex).map((part, i) => 
                    regex.test(part) ? <mark key={i} className="bg-yellow-200">{part}</mark> : part
                );
            };

            const filteredQuotes = quotes.filter(quote => {
                const matchesSearch = quote.quote.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesTheme = selectedTheme === 'all' || quote.theme === selectedTheme;
                const matchesSource = selectedSource === 'all' || quote.source === selectedSource;
                const matchesNumber = selectedNumber === 'all' || quote.number === selectedNumber;
                return matchesSearch && matchesTheme && matchesSource && matchesNumber;
            });

            return (
                <div className="container mx-auto p-4">
                    <h1 className="text-3xl font-bold text-center mb-8">Mā Vāṇi</h1>
                    
                    <div className="mb-6 space-y-4">
                        <div className="relative">
                            <Search className="absolute left-3 top-3 text-gray-400" size={20} />
                            <input
                                type="text"
                                placeholder="Search quotes..."
                                className="w-full pl-10 pr-4 py-2 border rounded-lg"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div className="flex items-center space-x-2">
                                <Tag size={20} className="text-gray-400" />
                                <select
                                    className="w-full p-2 border rounded-lg"
                                    value={selectedTheme}
                                    onChange={(e) => setSelectedTheme(e.target.value)}
                                >
                                    <option value="all">All Themes</option>
                                    {[...themes].map(theme => (
                                        <option key={theme} value={theme}>{theme}</option>
                                    ))}
                                </select>
                            </div>
                            
                            <div className="flex items-center space-x-2">
                                <Book size={20} className="text-gray-400" />
                                <select
                                    className="w-full p-2 border rounded-lg"
                                    value={selectedSource}
                                    onChange={(e) => setSelectedSource(e.target.value)}
                                >
                                    <option value="all">All Sources</option>
                                    {[...sources].map(source => (
                                        <option key={source} value={source}>{source}</option>
                                    ))}
                                </select>
                            </div>
                            
                            <div className="flex items-center space-x-2">
                                <Hash size={20} className="text-gray-400" />
                                <select
                                    className="w-full p-2 border rounded-lg"
                                    value={selectedNumber}
                                    onChange={(e) => setSelectedNumber(e.target.value)}
                                >
                                    <option value="all">All Numbers</option>
                                    {[...numbers].map(number => (
                                        <option key={number} value={number}>{number}</option>
                                    ))}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {filteredQuotes.map((quote, index) => (
                            <div key={index} className="p-4 border rounded-lg shadow hover:shadow-md transition-shadow">
                                <div className="text-lg mb-3">{highlightText(quote.quote, searchTerm)}</div>
                                <div className="text-sm text-gray-600 space-y-1">
                                    <div className="flex items-center space-x-2">
                                        <Tag size={16} />
                                        <span>{quote.theme}</span>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <Book size={16} />
                                        <span>{quote.source}</span>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <Hash size={16} />
                                        <span>{quote.number}</span>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // Render the app
        ReactDOM.render(<QuoteSearch />, document.getElementById('root'));
    </script>
</body>
</html>
