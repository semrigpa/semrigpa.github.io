<!-- Updated HTML with error handling -->
<!DOCTYPE html>
<html>
<head>
    <style>[Same CSS as before]</style>
</head>
<body>
    <div id="filters">[Same filters as before]</div>
    <div id="quoteContainer" class="grid"></div>
    <div id="error" style="color: red; padding: 20px;"></div>

    <script>
        async function loadTSV() {
            try {
                const response = await fetch('quotes.tsv');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.text();
                return data.split('\n')
                    .slice(1) // Skip header
                    .filter(row => row.trim()) // Remove empty lines
                    .map(row => {
                        const [theme, source, number, quote] = row.split('\t');
                        return {
                            theme: theme?.trim() || '',
                            source: source?.trim() || '',
                            number: number?.trim() || '',
                            quote: quote?.trim() || ''
                        };
                    });
            } catch (error) {
                document.getElementById('error').textContent = 
                    `Failed to load quotes: ${error.message}`;
                return [];
            }
        }

        // [Rest of the previous code with this addition:]
        async function initApp() {
            try {
                const quotes = await loadTSV();
                if (quotes.length === 0) {
                    document.getElementById('error').textContent = 
                        'No quotes found in TSV file';
                    return;
                }
                // [Rest of init code]
            } catch (e) {
                document.getElementById('error').textContent = 
                    `Initialization error: ${e.message}`;
            }
        }
    </script>
</body>
</html>
