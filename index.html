<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/index.json">
    <link rel="icon" type="image/png" href="favicon2.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semrigpa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
        }

        body {
            background-color: #fafafa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #333;
        }

        .menu-container {
            width: 92%;
            max-width: 550px;
            position: relative;
            z-index: 2;
        }

        .menu-title {
            text-align: center;
            margin-bottom: 1.8rem;
            color: #333;
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .divine-menu {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .menu-btn {
            position: relative;
            height: 140px;
            border-radius: 8px;
            overflow: hidden;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            background-position: center;
            background-size: cover;
        }

        .menu-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .menu-btn.maa::before {
            background: linear-gradient(135deg, rgba(255, 204, 213, 0.95) 0%, rgba(219, 112, 147, 0.95) 100%);
        }

        .menu-btn.shiva::before {
            background: linear-gradient(135deg, rgba(176, 196, 222, 0.95) 0%, rgba(70, 130, 180, 0.95) 100%);
        }

        .menu-btn-content {
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            z-index: 2;
            position: relative;
            color: #fff;
        }

        .deity-info {
            flex: 1;
        }

        .menu-btn-title {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 0.6rem;
            text-transform: capitalize;
        }

        .menu-btn-desc {
            font-size: 0.85rem;
            opacity: 0.95;
            font-weight: 300;
            max-width: 80%;
        }

        .deity-icon {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60px;
            width: 60px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            color: #fff;
            margin-left: 1rem;
        }

        /* Subtle decorative element */
        .decorative-border {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            opacity: 0.2;
            z-index: 2;
        }

        .decorative-border::before {
            content: '';
            position: absolute;
            left: 0;
            height: 100%;
            width: 3px;
        }

        .maa .decorative-border::before {
            background: #f8bbd0;
            box-shadow: 0 0 10px rgba(248, 187, 208, 0.5);
        }

        .shiva .decorative-border::before {
            background: #bbdefb;
            box-shadow: 0 0 10px rgba(187, 222, 251, 0.5);
        }

        /* Subtle dot pattern background */
        .background-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 0;
        }

        @media (min-width: 768px) {
            .divine-menu {
                flex-direction: row;
            }

            .menu-btn {
                flex: 1;
            }
        }

        @media (max-width: 480px) {
            .menu-btn {
                height: 120px;
            }

            .menu-btn-content {
                padding: 1rem 1.5rem;
            }

            .menu-title {
                font-size: 1.4rem;
            }

            .menu-btn-title {
                font-size: 1.2rem;
            }
            
            .deity-icon {
                height: 50px;
                width: 50px;
                font-size: 1.5rem;
            }
        }
.menu-btn.misc::before {
    background: linear-gradient(135deg, rgba(144, 238, 144, 0.95) 0%, rgba(50, 205, 50, 0.95) 100%);
}

.misc .decorative-border::before {
    background: #90ee90;
    box-shadow: 0 0 10px rgba(144, 238, 144, 0.5);
}
    </style>
</head>
<body>
    <!-- Subtle background pattern -->
    <div class="background-pattern"></div>

    <!-- Main menu container -->
    <div class="menu-container">
        <h1 class="menu-title">Semrigpa</h1>
        
        <div class="divine-menu">

            <a href="mavani.html" class="menu-btn maa">

                    </div>
                    <div class="deity-icon">
                        <span>🌸</span>
                    </div>
                </div>
            </a>
            
            <!-- Lord Shiva Button -->
            <a href="rudrashtakam.html" class="menu-btn shiva">
                <div class="decorative-border"></div>
                <div class="menu-btn-content">
                    <div class="deity-info">
                        <h2 class="menu-btn-title">Śrī Rudrāṣṭakam</h2>
                        <p class="menu-btn-desc">A Mantra-Meditation on the True Nature of Reality</p>
                    </div>
                    <div class="deity-icon">
                        <span>🔱</span>
                    </div>
                </div>
            </a>

</html>
