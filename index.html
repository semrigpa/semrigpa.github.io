<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/index.json">
    <link rel="icon" type="image/png" href="favicon2.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f5f5f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Semrigpa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        :root {
            --primary-bg: #f5f5f7;
            --card-bg: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-blue: #0066cc;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --card-radius: 16px;
            --button-radius: 24px;
            --transition-speed: 0.3s;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary-bg: #121212;
                --card-bg: #1e1e1e;
                --text-primary: #f5f5f7;
                --text-secondary: #a1a1a6;
                --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--primary-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px 40px;
            color: var(--text-primary);
        }

        .app-header {
            width: 100%;
            max-width: 600px;
            padding: 10px 0;
            margin-bottom: 12px;
            position: relative;
        }

        .app-title {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            animation: fadeIn 0.8s ease-out;
        }

        .app-subtitle {
            text-align: center;
            font-size: 16px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-bottom: 20px;
            animation: fadeIn 1s ease-out;
        }

        .app-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 600px;
            animation: fadeInUp 0.6s ease-out;
        }

        .app-card {
            background: var(--card-bg);
            border-radius: var(--card-radius);
            overflow: hidden;
            box-shadow: var(--card-shadow);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            transition: transform var(--transition-speed) ease, 
                        box-shadow var(--transition-speed) ease;
            position: relative;
            height: 100%;
        }

        .app-card:active {
            transform: scale(0.98);
        }

        .card-banner {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .card-banner::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.05);
            z-index: 1;
        }

        .pink-gradient {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
        }

        .blue-gradient {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
        }

        .purple-gradient {
            background: linear-gradient(135deg, #c471f5 0%, #fa71cd 100%);
        }

        .icon-container {
            height: 80px;
            width: 80px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            z-index: 2;
            transition: transform 0.3s ease;
        }

        .app-card:hover .icon-container {
            transform: scale(1.05);
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .card-description {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
            flex: 1;
        }

        .get-button {
            margin-top: 16px;
            background: var(--accent-blue);
            color: white;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: var(--button-radius);
            text-transform: uppercase;
            display: inline-block;
            text-align: center;
            box-shadow: 0 2px 10px rgba(0, 102, 204, 0.2);
            transition: all 0.3s ease;
        }

        .get-button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 5px rgba(0, 102, 204, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { 
                opacity: 0;
                transform: translateY(20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Status bar styling for iOS */
        @supports (-webkit-touch-callout: none) {
            body {
                padding-top: env(safe-area-inset-top);
                padding-bottom: calc(40px + env(safe-area-inset-bottom));
            }
        }

        @media (min-width: 540px) {
            .app-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 768px) {
            .app-grid {
                grid-template-columns: repeat(3, 1fr);
                max-width: 900px;
            }
        }

        /* Add ripple effect for touch */
        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        /* Loading animation */
        .app-loader {
            height: 3px;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            background: linear-gradient(to right, #6366f1, #8b5cf6, #ec4899);
            z-index: 9999;
            animation: loading 2s ease-in-out infinite;
            transform-origin: left;
        }

        @keyframes loading {
            0% { transform: scaleX(0); }
            50% { transform: scaleX(1); }
            100% { transform: scaleX(0); transform-origin: right; }
        }
    </style>
</head>
<body>
    <div class="app-loader"></div>
    
    <div class="app-header">
        <h1 class="app-title">Semrigpa</h1>
    </div>
    
    <div class="app-grid">
        <a href="mavani.html" class="app-card" ontouchstart="createRipple(event)">
            <div class="card-banner pink-gradient">
                <div class="icon-container">
                    <span>🌸</span>
                </div>
            </div>
            <div class="card-content">
                <h2 class="card-title">Mā Vāṇi</h2>
                <p class="card-description">Your spiritual gateway to the profound teachings of Śrī Śrī Ānandamayī Mā</p>
                <div class="get-button">Open</div>
            </div>
        </a>
        
        <a href="rudrashtakam.html" class="app-card" ontouchstart="createRipple(event)">
            <div class="card-banner blue-gradient">
                <div class="icon-container">
                    <span>🔱</span>
                </div>
            </div>
            <div class="card-content">
                <h2 class="card-title">Śrī Rudrāṣṭakam</h2>
                <p class="card-description">A Mantra-Meditation on the True Nature of Reality</p>
                <div class="get-button">Open</div>
            </div>
        </a>
        
        <a href="dictionary.html" class="app-card" ontouchstart="createRipple(event)">
            <div class="card-banner purple-gradient">
                <div class="icon-container">
                    <span>🙌</span>
                </div>
            </div>
            <div class="card-content">
                <h2 class="card-title">Dehuskan Juha</h2>
                <p class="card-description">Pien lalu ke jama</p>
                <div class="get-button">Open</div>
            </div>
        </a>
    </div>

    <script>
        // Add ripple effect on touch
        function createRipple(event) {
            const card = event.currentTarget;
            const circle = document.createElement("span");
            const diameter = Math.max(card.clientWidth, card.clientHeight);
            const radius = diameter / 2;
            
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.touches[0].pageX - card.offsetLeft - radius}px`;
            circle.style.top = `${event.touches[0].pageY - card.offsetTop - radius}px`;
            circle.classList.add("ripple");
            
            const ripple = card.querySelector(".ripple");
            if (ripple) {
                ripple.remove();
            }
            
            card.appendChild(circle);
        }

        // Add to home screen prompt for iOS
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        // Simulate page loading
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.querySelector('.app-loader').style.display = 'none';
            }, 1500);
        });

        // Add smooth scrolling
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
