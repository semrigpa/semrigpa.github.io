
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conlang Dictionary</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .card {
      margin: 10px;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .flip-button {
      margin-bottom: 20px;
    }
    .conlang-word {
      font-size: 2em;
      font-weight: bold;
    }
    .english-definition {
      color: #555;
    }
  </style>
</head>
<body>

  <div class="w3-container">
    <div class="header">
      <h1>Conlang <-> English Dictionary</h1>
    </div>

    <div class="w3-center flip-button">
      <button id="flipModeBtn" class="w3-button w3-blue w3-round">Switch to Conlang Mode</button>
    </div>

    <div class="w3-center w3-padding">
      <input type="text" id="searchInput" class="w3-input w3-border" placeholder="Search...">
    </div>

    <div id="resultContainer" class="w3-row-padding w3-margin-top"></div>
  </div>

  <script>
    let dictionary = []; // This will store the dictionary loaded from the .tsv file
    let searchMode = 'english'; // Default mode

    // Fetch the TSV file
    fetch('dictionary.tsv')
      .then(response => response.text())
      .then(data => {
        dictionary = parseTSV(data);
      })
      .catch(error => {
        console.error('Error fetching the TSV file:', error);
      });

    // Parse tab-delimited TSV data into an array of objects
    function parseTSV(data) {
      const rows = data.trim().split('\n');
      const parsedData = rows.slice(1).map(row => {
        const [english, conlang] = row.split('\t');
        return { english, conlang };
      });
      return parsedData;
    }

    // Flip between English and Conlang mode
    document.getElementById('flipModeBtn').addEventListener('click', () => {
      searchMode = searchMode === 'english' ? 'conlang' : 'english';
      document.getElementById('flipModeBtn').innerText = 
        searchMode === 'english' ? 'Switch to Conlang Mode' : 'Switch to English Mode';
      document.getElementById('searchInput').value = ''; // Clear search input
      document.getElementById('resultContainer').innerHTML = ''; // Clear results
    });

    // Search functionality
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const searchValue = e.target.value.toLowerCase();
      const filtered = dictionary.filter(entry => 
        entry[searchMode].toLowerCase().startsWith(searchValue)
      );
      displayResults(filtered);
    });

    // Display results as cards
    function displayResults(entries) {
      const resultContainer = document.getElementById('resultContainer');
      resultContainer.innerHTML = ''; // Clear previous results

      entries.forEach(entry => {
        const card = document.createElement('div');
        card.className = 'w3-card-4 w3-col l3 m6 card';

        const content = `
          <div class="w3-container w3-padding">
            <h3 class="conlang-word">${searchMode === 'english' ? entry.english : entry.conlang}</h3>
            <p class="english-definition">${searchMode === 'english' ? entry.conlang : entry.english}</p>
          </div>
        `;
        card.innerHTML = content;
        resultContainer.appendChild(card);
      });
    }
  </script>
</body>
</html>
