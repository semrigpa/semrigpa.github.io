<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Josiah's Notes</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <style>
        body {
            background-color: #e8d89f; /* Light khaki background */
            color: #333; /* Default text color */
        }
        .w3-teal {
            background-color: #a40e0e; /* Dark red for the title bar */
        }
        .w3-button {
            background-color: #a40e0e; /* Dark red for buttons */
            color: white; /* Button text color */
            font-size: 0.9em; /* Slightly smaller font size */
            padding: 8px 16px; /* Adjust padding for a smaller button */
        }
        .w3-button:hover {
            background-color: #850b0b; /* Darker shade on hover */
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #fff; /* White background for text content */
            color: #000; /* Black text for content */
            margin-bottom: 0; /* Remove bottom margin */
        }
        #back, #exit {
            margin-top: 0; /* Remove top margin */
            margin-bottom: 20px; /* Add bottom margin to separate from bottom */
        }
        h2 {
            margin-bottom: 0; /* Remove bottom margin from h2 */
        }
    </style>
</head>
<body>

    <div class="w3-container w3-teal">
        <h1 class="w3-center">Josiah's Notes</h1>
    </div>

    <div id="menu" class="w3-container">
        <h2>Available Text Files:</h2>
        <div class="w3-row-padding" id="fileButtons"></div>
    </div>

    <div id="content" class="w3-container" style="display:none;">
        <h2 id="contentTitle" class="w3-center" style="margin-bottom: 0;"></h2> <!-- No margin below title -->
