<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Josiah's Notes</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <style>
        body {
            background-color: #e8d89f; /* Light khaki background */
            color: #222; /* Darker text for readability */
        }
        .w3-teal {
            background-color: #a40e0e; /* Dark red for the title bar */
        }
        .w3-button {
            background-color: #a40e0e; /* Dark red for buttons */
            color: white; /* Button text color */
            font-size: 14px; /* Smaller button size */
            padding: 8px 16px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2); /* Subtle shadow for depth */
            transition: background-color 0.3s ease; /* Smooth hover effect */
        }
        .w3-button:hover {
            background-color: #850b0b; /* Darker shade on hover */
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #fff; /* White background for text content */
            color: #000; /* Black text for content */
            padding: 15px;
            border: 1px solid #ccc;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1); /* Shadow for content box */
        }
        #back, #exit {
            margin-top: 20px;
        }
        /* Highlight the selected file button */
        .active-button {
            border: 2px solid #fff; /* White border for the active file */
        }
        /* Add logo styling (if you add an icon) */
        .logo {
            margin-right: 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div class="w3-container w3-teal">
        <h1 class="w3-center">
            <img src="https://img.icons8.com/ios-filled/50/FFFFFF/note.png" alt="logo" class="logo"> <!-- Note icon added -->
            Josiah's Notes
        </h1>
    </div>

    <div id="menu" class="w3-container">
        <h2>Available Text Files:</h2>
        <div class="w3-row-padding" id="fileButtons"></div>
    </div>

    <div id="content" class="w3-container" style="display:none;">
        <h2 id="contentTitle" class="w3-center"></h2>
        <a id="exit" class="w3-button w3-margin-bottom" href="#" onclick="showMenu()">Back to Menu</a>
        <pre id="textContent" class="w3-border w3-padding">Loading content...</pre>
        <a id="back" class="w3-button w3-margin-top" href="#" onclick="showMenu()">Back to Menu</a>
    </div>

    <script>
        // List of text files
        const textFiles = ['file1.txt', 'file2.txt', 'file3.txt']; // Add more files as needed

        // Dynamically create buttons based on the first line of each text file
        function createButtons() {
            const fileButtonsContainer = document.getElementById('fileButtons');
            textFiles.forEach(file => {
                fetch(file)
                    .then(response => {
                        if (!response.ok) throw new Error('File not found');
                        return response.text();
                    })
                    .then(text => {
                        const title = text.split('\n')[0]; // Get the first line for the button title
                        const buttonHtml = `<div class="w3-col m4">
                                                <a href="#" class="w3-button w3-margin-bottom" onclick="loadText('${file}', this)">${title}</a>
                                            </div>`;
                        fileButtonsContainer.innerHTML += buttonHtml; // Add the button to the container
                    })
                    .catch(error => console.error(`Error loading file for button: ${error.message}`));
            });
        }

        function loadText(filename, element) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            // Remove active class from all buttons and add to clicked button
            document.querySelectorAll('.w3-button').forEach(button => button.classList.remove('active-button'));
            element.classList.add('active-button');

            fetch(filename)
                .then(response => {
                    if (!response.ok) throw new Error('File not found');
                    return response.text();
                })
                .then(text => {
                    const lines = text.split('\n');
                    const title = lines[0] || "Untitled";
                    const content = lines.slice(1).join('\n');
                    document.getElementById('contentTitle').textContent = title;
                    document.getElementById('textContent').textContent = content;
                })
                .catch(error => {
                    document.getElementById('textContent').textContent = `Error loading file: ${error.message}`;
                });
        }

        function showMenu() {
            document.getElementById('menu').style.display = 'block';
            document.getElementById('content').style.display = 'none';
        }

        // Initialize the buttons when the page loads
        window.onload = createButtons;
    </script>

</body>
</html>
