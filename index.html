<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>
  <style>
    /* Reset default styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body styles */
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f8f8;
      margin: 0;
      padding: 0;
    }

    /* Top menu styles */
    .top-menu {
      background-color: #333;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
    }

    .top-menu a {
      float: left;
      display: block;
      color: white;
      text-align: center;
      padding: 14px 20px;
      text-decoration: none;
    }

    .top-menu a:hover {
      background-color: #555;
    }

    /* Main content styles */
    .content {
      padding: 20px;
      margin-top: 60px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .content h1 {
      margin-bottom: 20px;
    }

    /* Footer styles */
    .footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <!-- Top menu -->
  <div class="top-menu">
    <a href="#home">Home</a>
  </div>

  <!-- Main content -->
  <div class="content">
    <h1>Welcome to My Website</h1>
    <p>This is a simple and modern website design with a top menu. It's designed to be clean and visually appealing.</p>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>&copy; 2023 My Website. All rights reserved.</p>
  </div>
</body>
</html>
