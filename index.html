<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semrigpa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a3e;
            --accent-pink: #ff6b9d;
            --accent-blue: #4f8fff;
            --accent-purple: #9b59b6;
            --text-primary: #ffffff;
            --text-secondary: #a8a8b3;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        .particle:nth-child(1) {
            width: 4px;
            height: 4px;
            left: 10%;
            animation-delay: -2s;
            animation-duration: 15s;
        }

        .particle:nth-child(2) {
            width: 6px;
            height: 6px;
            left: 20%;
            animation-delay: -5s;
            animation-duration: 18s;
        }

        .particle:nth-child(3) {
            width: 3px;
            height: 3px;
            left: 30%;
            animation-delay: -8s;
            animation-duration: 22s;
        }

        .particle:nth-child(4) {
            width: 5px;
            height: 5px;
            left: 50%;
            animation-delay: -12s;
            animation-duration: 16s;
        }

        .particle:nth-child(5) {
            width: 4px;
            height: 4px;
            left: 70%;
            animation-delay: -3s;
            animation-duration: 20s;
        }

        .particle:nth-child(6) {
            width: 7px;
            height: 7px;
            left: 85%;
            animation-delay: -7s;
            animation-duration: 14s;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            max-width: 100%;
        }

        /* Header section */
        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: slideDown 1s ease-out;
        }

        .logo {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-pink) 0%, var(--accent-blue) 50%, var(--accent-purple) 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 4s ease-in-out infinite;
            margin-bottom: 10px;
            line-height: 1.1;
        }

        .tagline {
            color: var(--text-secondary);
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.5s forwards;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* Apps grid */
        .apps-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            max-width: 500px;
            width: 100%;
            animation: slideUp 1s ease-out 0.3s both;
        }

        .app-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            min-height: 160px;
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .app-card:hover::before {
            left: 100%;
        }

        .app-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: var(--shadow);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .app-card:active {
            transform: translateY(-5px) scale(0.98);
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 20px;
            position: relative;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .mavani-icon {
            background: linear-gradient(135deg, var(--accent-pink) 0%, #ff8a95 100%);
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.3);
        }

        .dictionary-icon {
            background: linear-gradient(135deg, var(--accent-blue) 0%, #6fa8ff 100%);
            box-shadow: 0 10px 30px rgba(79, 143, 255, 0.3);
        }

        .app-card:hover .app-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .app-title {
            font-size: 1.1rem;
            font-weight: 500;
            text-align: center;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .app-card:hover .app-title {
            transform: translateY(-2px);
            color: var(--text-primary);
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Staggered animation for app cards */
        .app-card:nth-child(1) {
            animation: popIn 0.6s ease-out 0.8s both;
        }

        .app-card:nth-child(2) {
            animation: popIn 0.6s ease-out 1s both;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            80% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header {
                margin-bottom: 40px;
            }

            .apps-container {
                gap: 20px;
                max-width: 400px;
            }

            .app-card {
                padding: 30px 15px;
                min-height: 140px;
            }

            .app-icon {
                width: 70px;
                height: 70px;
                font-size: 2rem;
                margin-bottom: 15px;
            }

            .app-title {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 10px;
                min-height: 100vh;
                min-height: 100svh;
            }

            .header {
                margin-bottom: 30px;
            }

            .apps-container {
                gap: 15px;
                max-width: 300px;
                grid-template-columns: 1fr 1fr;
            }

            .app-card {
                padding: 25px 10px;
                min-height: 120px;
                border-radius: 20px;
            }

            .app-icon {
                width: 60px;
                height: 60px;
                font-size: 1.8rem;
                margin-bottom: 12px;
                border-radius: 16px;
            }

            .app-title {
                font-size: 0.9rem;
            }

            .tagline {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 320px) {
            .apps-container {
                max-width: 280px;
                gap: 12px;
            }

            .app-card {
                padding: 20px 8px;
                min-height: 110px;
            }

            .app-icon {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
                margin-bottom: 10px;
                border-radius: 14px;
            }

            .app-title {
                font-size: 0.85rem;
            }
        }

        /* Landscape mode optimization */
        @media (max-height: 600px) and (orientation: landscape) {
            .container {
                padding: 10px;
                justify-content: center;
            }

            .header {
                margin-bottom: 20px;
            }

            .logo {
                font-size: clamp(2rem, 6vw, 3rem);
                margin-bottom: 5px;
            }

            .tagline {
                font-size: 0.9rem;
            }

            .apps-container {
                gap: 15px;
            }

            .app-card {
                padding: 20px 15px;
                min-height: 100px;
            }

            .app-icon {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
                margin-bottom: 8px;
            }

            .app-title {
                font-size: 0.9rem;
            }
        }

        /* Accessibility and reduced motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        .app-card:focus {
            outline: 2px solid var(--accent-pink);
            outline-offset: 2px;
        }

        /* Safe area support for notched devices */
        @supports (padding: max(0px)) {
            .container {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-top: max(20px, env(safe-area-inset-top));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }

        /* High DPI support */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .app-icon {
                image-rendering: -webkit-optimize-contrast;
                image-rendering: crisp-edges;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1 class="logo">Semrigpa</h1>
            <p class="tagline">Mindful Applications</p>
        </div>
        
        <div class="apps-container">
            <a href="https://semrigpa.github.io/mavani.html" class="app-card">
                <div class="app-icon mavani-icon">🌸</div>
                <span class="app-title">Mā Vāṇi</span>
            </a>
            
            <a href="https://semrigpa.github.io/dictionary.html" class="app-card">
                <div class="app-icon dictionary-icon">📓</div>
                <span class="app-title">Sekay Til</span>
            </a>
        </div>
    </div>
</body>
</html>
