<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Reset default styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body styles */
    body {
      font-family: Arial, sans-serif;
      background-color: #333;
      color: #f8f8f8; /* Set text color for light mode */
      margin: 0;
      padding: 0;
    }

    /* Top menu styles */
    .top-menu {
      background-color: #222; /* Darken background color */
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999; /* Add a higher z-index value to ensure it's on top of other elements */
    }

    .top-menu a {
      float: left;
      display: block;
      color: #f8f8f8; /* Set text color for light mode */
      text-align: center;
      padding: 14px 20px;
      text-decoration: none;
    }

    .top-menu a:hover {
      background-color: #555;
    }

    /* Main content styles */
    .content {
      padding: 20px;
      margin-top: 60px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .content h1 {
      margin-bottom: 20px;
    }
    .content h2 {
      margin-bottom: 20px;
    }
    /* Footer styles */
    .footer {
      background-color: #222; /* Darken background color */
      color: #f8f8f8; /* Set text color for light mode */
      text-align: center;
      padding: 10px;
      width: 100%;
      position: fixed;
      bottom: 0;
      left: 0;
    }

    /* Responsive styles */
    @media screen and (max-width: 600px) {
      /* Adjust top menu padding for smaller screens */
      .top-menu a {
        padding: 10px 15px;
      }

      /* Adjust content margin for smaller screens */
      .content {
        margin-top: 40px;
      }

      /* Adjust footer padding for smaller screens */
      .footer {
        padding: 5px;
      }
    }
  </style>
</head>
<body>
  <!-- Top menu -->
  <div class="top-menu">
    <a href="">Home</a>
    <a href="dir.html">Index</a>
  </div>

  <!-- Main content -->
  <div class="content">
    <h1>Semrigpa</h1>
    <p></p>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>&copy; 2023 Semrigpa. All rights reserved.</p>
  </div>
</body>
</html>
