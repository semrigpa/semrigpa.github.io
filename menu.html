<!DOCTYPE html>
<html>
<head>
<title>Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel="stylesheet" href="w3.css">
<link href='https://fonts.googleapis.com/css?family=EB Garamond' rel='stylesheet'>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>

/* Style for fixed green top bar */
.top-bar {
  position: fixed;
  top: 0;
  width: 100%;
  background-color: black;
  color: white;
  padding: 15px 0; /* Adjust top padding */
  text-align: center; /* Center header text */
}

/* Style for fixed bar at the bottom */
.bottom-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background-color: black; /* Same color as the top bar */
  color: white;
  padding: 10px;
  text-align: center;
}

/* Style for scrollable content */
.content {
  margin-top: 70px; /* Adjust this margin to avoid content overlap with headers */
  padding: 20px;
}

/* Hide content sections by default */
.content section {
  display: none;
}

/* Show active content section */
.content section.active {
  display: block;
}

/* Button style */
.bottom-bar button {
  background-color: transparent;
  color: white;
  padding: 10px 20px;
  border: 2px solid white; /* Add border */
  border-radius: 5px; /* Rounded corners */
  cursor: pointer;
  margin: 0 6px; /* Adjust button margin */
}

/* Remove default button styles */
.bottom-bar button:focus {
  outline: none;
}

/* Increase top header text size */
.top-bar span {
  font-size: 20px; /* Adjust font size */
}


</style>
</head>
<body>
  
<div class="top-bar">
  <span>Menu</span>
</div>

  <!-- Repeat the content sections for additional pages -->

<!-- Fixed bar at the bottom with buttons -->
<div class="bottom-bar">
   <button onclick="showPage('about')" class="w3-black">☠️</button>
        
   

</div>

<script>
// Function to show the specified page and hide others
function showPage(pageId) {
  // Hide all content sections
  document.querySelectorAll('.content section').forEach(section => {
    section.classList.remove('active');
  });
  
  // Show the target content section
  document.getElementById(pageId).classList.add('active');
}
</script>
