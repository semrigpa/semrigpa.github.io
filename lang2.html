<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagaii Dexija</title>
    <style>
        :root {
            --primary: #60a5fa;
            --primary-dark: #3b82f6;
            --background: #111827;
            --surface: #1f2937;
            --border: #374151;
            --text: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--text);
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            background-color: var(--background);
            z-index: 10;
            border-bottom: 1px solid var(--border);
        }

        .back-button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            width: 2.5rem;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background-color 0.2s;
        }

        .back-button:hover {
            background: var(--primary-dark);
        }

        .search-container {
            flex-grow: 1;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            background-color: var(--surface);
            color: var(--text);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .results-counter {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .results-number {
            color: var(--primary);
            font-weight: 600;
        }

        .grammar-section {
            background-color: var(--surface);
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .grammar-header {
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            user-select: none;
        }

        .grammar-title {
            color: var(--primary);
            font-size: 1rem;
            font-weight: 600;
        }

        .grammar-content {
            display: none;
            padding: 1rem;
        }

        .grammar-content.active {
            display: block;
        }

        .dropdown-arrow {
            color: var(--primary);
            transition: transform 0.3s ease;
        }

        .dropdown-arrow.active {
            transform: rotate(180deg);
        }

        .phonology-section {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            color: var(--primary);
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .phonology-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(2rem, 1fr));
            gap: 0.5rem;
            font-family: 'Cinzel', serif;
            margin-bottom: 1rem;
        }

        .phonology-item {
            text-align: center;
            padding: 0.5rem;
            background-color: var(--background);
            border-radius: 0.25rem;
            border: 1px solid var(--border);
        }

        .special-combos {
            display: flex;
            gap: 1rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .grammar-table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--background);
            border-radius: 0.5rem;
            overflow: hidden;
            margin-top: 1.5rem;
        }

        .grammar-table th,
        .grammar-table td {
            padding: 0.75rem;
            text-align: left;
            border: 1px solid var(--border);
            font-size: 0.875rem;
        }

        .grammar-table th {
            background-color: var(--surface);
            color: var(--primary);
            font-weight: 600;
        }

        .grammar-table td:first-child {
            font-weight: 600;
            color: var(--primary);
        }

        .dictionary-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid var(--border);
            background-color: var(--surface);
        }

        .dictionary-table th {
            background-color: var(--surface);
            color: var(--primary);
            font-weight: 600;
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .dictionary-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            background-color: var(--background);
        }

        .dictionary-table tr:last-child td {
            border-bottom: none;
        }

        .nagai-text {
            font-family: 'Cinzel', serif;
            color: var(--primary);
        }

        .pos-tag {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        @media (max-width: 640px) {
            .container {
                padding: 0.5rem;
            }

            .header {
                padding: 0.5rem 0;
            }

            .grammar-table {
                margin: 1rem 0;
            }

            .grammar-table th,
            .grammar-table td {
                padding: 0.5rem;
                font-size: 0.75rem;
            }

            .dictionary-table th,
            .dictionary-table td {
                padding: 0.75rem;
            }

            .phonology-grid {
                grid-template-columns: repeat(auto-fill, minmax(1.5rem, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-button" onclick="history.back()">←</button>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search Nagai or English terms...">
                <div class="results-counter">
                    Entries: <span class="results-number" id="searchResults">0</span>
                </div>
            </div>
        </div>

        <div class="grammar-section">
            <div class="grammar-header" id="grammarToggle">
                <h2 class="grammar-title">Grammar & Phonology Guide</h2>
                <span class="dropdown-arrow">▼</span>
            </div>
            <div class="grammar-content" id="grammarContent">
                <div class="phonology-section">
                    <h3 class="section-title">Phonology</h3>
                    <div class="phonology-grid">
                        <div class="phonology-item">a</div>
                        <div class="phonology-item">b</div>
                        <div class="phonology-item">d</div>
                        <div class="phonology-item">e</div>
                        <div class="phonology-item">g</div>
                        <div class="phonology-item">h</div>
                        <div class="phonology-item">i</div>
                        <div class="phonology-item">k</div>
                        <div class="phonology-item">l</div>
                        <div class="phonology-item">m</div>
                        <div class="phonology-item">n</div>
                        <div class="phonology-item">o</div>
                        <div class="phonology-item">p</div>
                        <div class="phonology-item">r</div>
                        <div class="phonology-item">s</div>
                        <div class="phonology-item">t</div>
                        <div class="phonology-item">u</div>
                        <div class="phonology-item">w</div>
                        <div class="phonology-item">y</div>
                    </div>
                    <div class="special-combos">
                        <span>sh = S</span>
                        <span>th = T</span>
                    </div>
                </div>

                <table class="grammar-table">
                    <thead>
                        <tr>
                            <th></th>
                            <th>Nouns</th>
                            <th>Verbs</th>
                            <th>Adjectives</th>
                            <th>Adverbs</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Nouns</td>
                            <td>-</td>
                            <td>-he</td>
                            <td>-i</td>
                            <td>-ya</td>
                        </tr>
                        <tr>
                            <td>Verbs</td>
                            <td>-(a)n</td>
                            <td>-</td>
                            <td>-i</td>
                            <td>-</td>
                        </tr>
                        <tr>
                            <td>Adjectives</td>
                            <td>-(a)n</td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <table class="dictionary-table">
            <thead>
                <tr>
                    <th>Nagai</th>
                    <th>POS</th>
                    <th>English</th>
                </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
        </table>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const resultsBody = document.getElementById('resultsBody');
        const grammarToggle = document.getElementById('grammarToggle');
        const grammarContent = document.getElementById('grammarContent');
        const dropdownArrow = document.querySelector('.dropdown-arrow');
        const searchResultsElement = document.getElementById('searchResults');
        let data = [];

        // Fixed dropdown toggle
        grammarToggle.addEventListener('click', () => {
            grammarContent.classList.toggle('active');
            dropdownArrow.classList.toggle('active');
        });

        const parseData = (csv) => {
            const lines = csv.trim().split('\n');
            const entries = lines.slice(1).map(line => {
                const values = line.split(',');
                return {
                    lang: values[1],
                    pos: values[2],
                    eng: values[3]
                };
            });
            return entries.sort((a, b) => a.lang.localeCompare(b.lang));
        };

        const loadCSV = async () => {
            try {
                const response = await fetch('dictionary.csv');
                if (!response.ok) throw new Error('Failed to load dictionary.csv');
                const csvText = await response.text();
                data = parseData(csvText);
                displayResults(data);
            } catch (error) {
                console.error('Error loading CSV file:', error);
                resultsBody.innerHTML = `
                    <tr>
                        <td colspan="3" style="text-align: center; padding: 2rem; color: var(--text-secondary);">
                            Failed to load dictionary
                        </td>
                    </tr>`;
            }
        };

        const searchDictionary = (query) => {
            query = query.toLowerCase();
            const results = data.filter(item => 
                item.eng.toLowerCase().includes(query) ||
                item.lang.toLowerCase().includes(query)
            );
            searchResultsElement.textContent = results.length;
            return results;
        };

        const displayResults = (results) => {
            if (results.length === 0) {
                resultsBody.innerHTML = `
                    <tr>
                        <td colspan="3" style="text-align: center; padding: 2rem; color: var(--text-secondary);">
                            No matching results found
                        </td>
                    </tr>`;
                return;
            }

            resultsBody.innerHTML = results.map(item => `
                <tr>
                    <td class="nagai-text">${item.lang}</td>
                    <td class="pos-tag">${item.pos}</td>
                    <td>${item.eng}</td>
                </tr>
            `).join('');
            searchResultsElement.textContent = results.length;
        };

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value;
            const results = searchDictionary(query);
            displayResults(results);
        });

        loadCSV();
    </script>
</body>
</html>
