<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safi Dictionary</title>
    <style>
        :root {
            --background: #f4f1ea;
            --paper: #fff;
            --text: #2c1810;
            --accent: #8b7355;
            --border: #d3cec4;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Crimson Text", Georgia, serif;
            background-color: var(--background);
            color: var(--text);
            line-height: 1.6;
            background-image: 
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 2px,
                    rgba(139, 115, 85, 0.03) 2px,
                    rgba(139, 115, 85, 0.03) 4px
                );
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0.5rem;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem;
            background-color: var(--paper);
            border: 1px solid var(--border);
            border-radius: 4px;
            box-shadow: 0 2px 4px var(--shadow);
            margin-bottom: 1rem;
        }

        .back-button {
            background: var(--accent);
            color: var(--paper);
            border: none;
            border-radius: 4px;
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .back-button:hover {
            background: #6b5741;
        }

        .search-container {
            flex-grow: 1;
        }

        input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background-color: var(--paper);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .results-counter {
            color: var(--accent);
            font-size: 0.9rem;
            font-style: italic;
            margin-top: 0.25rem;
        }

        .dictionary-table {
            width: 100%;
            background: var(--paper);
            border-radius: 4px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 4px var(--shadow);
            border-collapse: collapse;
        }

        .dictionary-table th {
            background-color: var(--background);
            color: var(--text);
            font-weight: 600;
            text-align: left;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-variant: small-caps;
            letter-spacing: 0.05em;
        }

        .dictionary-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            background-color: var(--paper);
        }

        .dictionary-table tr:last-child td {
            border-bottom: none;
        }

        .dictionary-table tr:hover td {
            background-color: #fbf9f6;
        }

        .nagai-text {
            color: var(--text);
            font-weight: 500;
        }

        .pos-tag {
            color: var(--accent);
            font-style: italic;
            font-size: 0.9rem;
        }

        /* Paper texture effect */
        .header, .dictionary-table {
            background-image: 
                repeating-linear-gradient(
                    var(--paper) 0px,
                    var(--paper) 1px,
                    transparent 1px,
                    transparent 2px
                );
            background-size: 100% 2px;
        }

        @media (max-width: 640px) {
            .container {
                margin: 0.5rem auto;
            }
            
            .dictionary-table th,
            .dictionary-table td {
                padding: 0.5rem;
            }

            .header {
                padding: 0.5rem;
            }
        }

        /* Decorative elements */
        .header::before,
        .dictionary-table::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(139, 115, 85, 0.1),
                transparent
            );
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-button" onclick="history.back()">←</button>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search entries...">
                <div class="results-counter">
                    Showing <span id="searchResults">0</span> entries
                </div>
            </div>
        </div>

        <table class="dictionary-table">
            <thead>
                <tr>
                    <th>Term</th>
                    <th>Type</th>
                    <th>Definition</th>
                </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
        </table>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const resultsBody = document.getElementById('resultsBody');
        const searchResultsElement = document.getElementById('searchResults');
        let data = [];

        const parseData = (csv) => {
            const lines = csv.trim().split('\n');
            const headers = lines[0].toLowerCase().split(',');
            return lines.slice(1).map(line => {
                const values = line.split(',').map(val => val.trim());
                return {
                    lang: values[headers.indexOf('lang')],
                    pos: values[headers.indexOf('pos')],
                    eng: values[headers.indexOf('eng')]
                };
            }).sort((a, b) => a.lang.localeCompare(b.lang));
        };

        const loadCSV = async () => {
            try {
                const response = await fetch('dict.csv');
                if (!response.ok) throw new Error('Failed to load dict.csv');
                const csvText = await response.text();
                data = parseData(csvText);
                displayResults(data);
            } catch (error) {
                console.error('Error loading CSV:', error);
                resultsBody.innerHTML = `
                    <tr>
                        <td colspan="3" style="text-align: center; padding: 2rem; color: var(--accent); font-style: italic;">
                            Unable to load dictionary entries
                        </td>
                    </tr>`;
            }
        };

        const searchDictionary = (query) => {
            query = query.toLowerCase();
            return data.filter(item => 
                item.eng.toLowerCase().includes(query) ||
                item.lang.toLowerCase().includes(query)
            );
        };

        const displayResults = (results) => {
            searchResultsElement.textContent = results.length;
            
            if (results.length === 0) {
                resultsBody.innerHTML = `
                    <tr>
                        <td colspan="3" style="text-align: center; padding: 2rem; color: var(--accent); font-style: italic;">
                            No matching entries found
                        </td>
                    </tr>`;
                return;
            }

            resultsBody.innerHTML = results.map(item => `
                <tr>
                    <td class="nagai-text">${item.lang}</td>
                    <td class="pos-tag">${item.pos}</td>
                    <td>${item.eng}</td>
                </tr>
            `).join('');
        };

        searchInput.addEventListener('input', (e) => {
            const results = searchDictionary(e.target.value);
            displayResults(results);
        });

        loadCSV();
    </script>
</body>
</html>
